name: Release

on:
  release:
    types: [published]

permissions:
  contents: write

jobs:
  release-zip:
    name: Build and attach release ZIP
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set integration version from release tag
        run: |
          tag="${GITHUB_REF##*/}"
          tag="${tag#v}"
          jq --arg v "$tag" '.version = $v' \
             custom_components/orbit_bhyve/manifest.json > manifest.tmp
          mv manifest.tmp custom_components/orbit_bhyve/manifest.json

      - name: Build orbit_bhyve.zip
        run: |
          cd custom_components/orbit_bhyve
          zip -r ../../orbit_bhyve.zip .

      - name: Attach ZIP to release
        uses: softprops/action-gh-release@v2
        with:
          files: orbit_bhyve.zip
